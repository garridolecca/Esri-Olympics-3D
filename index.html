<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LA 2028 Olympics - 3D Venue Explorer</title>

  <script type="importmap">
  {
    "imports": {
      "@arcgis/core/": "https://js.arcgis.com/5.0/@arcgis/core/"
    }
  }
  </script>

  <!-- Calcite Design System 5.0 — recommended layout foundation -->
  <script type="module" src="https://js.arcgis.com/calcite-components/5.0"></script>

  <link rel="stylesheet" href="https://js.arcgis.com/5.0/@arcgis/core/assets/esri/themes/dark/main.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="calcite-mode-dark">

<calcite-shell>

  <!-- ====== HEADER (Calcite Navigation) ====== -->
  <calcite-navigation slot="header">
    <calcite-action slot="navigation-action" id="menuToggle"
      icon="hamburger" text="Toggle venue list"></calcite-action>
    <div slot="content-start" class="brand">
      <div class="rings">
        <div class="ring r-blue"></div>
        <div class="ring r-gold"></div>
        <div class="ring r-black"></div>
        <div class="ring r-green"></div>
        <div class="ring r-red"></div>
      </div>
      <div>
        <div class="brand-title">LA 2028 Olympic Venues</div>
        <div class="brand-sub">3D Venue Explorer</div>
      </div>
    </div>
    <div slot="content-end">
      <calcite-chip scale="s" kind="neutral" appearance="outline-fill"
        id="venueCount">20 Venues</calcite-chip>
    </div>
  </calcite-navigation>

  <!-- ====== LEFT PANEL (Calcite Shell Panel) ====== -->
  <calcite-shell-panel slot="panel-start" id="leftPanel" width-scale="m">
    <calcite-panel heading="Olympic Venues" heading-level="2">
      <div class="panel-search">
        <calcite-input-text id="venueSearch"
          placeholder="Search by name, sport or city..."
          icon="search" clearable scale="m"></calcite-input-text>
      </div>
      <div class="filter-block">
        <div class="filter-title">Venue Types</div>
        <div class="filter-row" data-cat="indoor">
          <span class="filter-dot indoor"></span>
          <span class="filter-label">Indoor Arena</span>
          <calcite-switch id="filterIndoor" checked scale="s"></calcite-switch>
        </div>
        <div class="filter-row" data-cat="outdoor">
          <span class="filter-dot outdoor"></span>
          <span class="filter-label">Outdoor / Stadium</span>
          <calcite-switch id="filterOutdoor" checked scale="s"></calcite-switch>
        </div>
        <div class="filter-row" data-cat="village">
          <span class="filter-dot village"></span>
          <span class="filter-label">Athletes Village</span>
          <calcite-switch id="filterVillage" checked scale="s"></calcite-switch>
        </div>
      </div>
      <div id="venueList"></div>
    </calcite-panel>
  </calcite-shell-panel>

  <!-- ====== MAP (Main Content) ====== -->
  <div id="viewDiv">
    <!-- LA View button — zooms to show all venues -->
    <calcite-button id="laViewBtn" appearance="solid" kind="neutral"
      icon-start="urban-model" scale="s" round>
      LA View — All Venues
    </calcite-button>
  </div>

  <!-- ====== RIGHT PANEL (Calcite Shell Panel — single scrollable panel) ====== -->
  <calcite-shell-panel slot="panel-end" id="sidebarPanel" width-scale="m">
    <calcite-panel heading="Controls" heading-level="2">

      <!-- Venue details — shown/hidden via CSS when a venue is selected -->
      <div id="venueDetailSection" class="venue-detail-hidden">
        <calcite-block id="sidebar" heading="&mdash;" description="&mdash;" open collapsible>
          <calcite-icon icon="map-pin" slot="icon" scale="s"></calcite-icon>
          <calcite-chip id="sbBadge" scale="s"
            kind="brand" appearance="outline-fill">Venue</calcite-chip>
          <div class="sb-desc" id="sbDesc" style="margin-top: 8px;">&mdash;</div>
        </calcite-block>

        <calcite-block heading="Sports &amp; Events" open collapsible>
          <calcite-icon icon="pin" slot="icon" scale="s"></calcite-icon>
          <div class="chips" id="sbSports"></div>
        </calcite-block>

        <calcite-block heading="Venue Details" open collapsible>
          <calcite-icon icon="list" slot="icon" scale="s"></calcite-icon>
          <div class="igrid" id="sbInfo"></div>
        </calcite-block>

        <calcite-notice open icon="x-circle" scale="s" kind="neutral" id="closeVenueBtn" class="close-venue-notice">
          <span slot="message">Close venue details</span>
        </calcite-notice>
      </div>

      <!-- Environment controls — always visible -->
      <calcite-block heading="Time of Day" open collapsible>
        <calcite-icon icon="clock" slot="icon" scale="s"></calcite-icon>
        <calcite-slider id="daylightSlider" min="0" max="23.5" value="10"
          step="0.5" snap scale="s"></calcite-slider>
        <div class="env-val" id="daylightLabel">10:00 AM</div>
      </calcite-block>

      <calcite-block heading="Weather" open collapsible>
        <calcite-icon icon="partly-cloudy" slot="icon" scale="s"></calcite-icon>
        <calcite-segmented-control id="weatherBtns" scale="s" width="full"
          appearance="outline">
          <calcite-segmented-control-item value="sunny" checked>Clear</calcite-segmented-control-item>
          <calcite-segmented-control-item value="cloudy">Cloud</calcite-segmented-control-item>
          <calcite-segmented-control-item value="foggy">Fog</calcite-segmented-control-item>
          <calcite-segmented-control-item value="rainy">Rain</calcite-segmented-control-item>
        </calcite-segmented-control>
      </calcite-block>

      <calcite-block heading="Effects" open collapsible>
        <calcite-icon icon="brightness" slot="icon" scale="s"></calcite-icon>
        <calcite-label scale="s" layout="inline-space-between">
          Shadows
          <calcite-switch id="shadowToggle" checked scale="s"></calcite-switch>
        </calcite-label>
        <calcite-label scale="s" style="margin-top: 8px;">
          Glow Intensity
          <calcite-slider id="glowSlider" min="0" max="1" value="0.4"
            step="0.05" scale="s"></calcite-slider>
        </calcite-label>
      </calcite-block>

    </calcite-panel>
  </calcite-shell-panel>

</calcite-shell>

<!-- ====== TOOLTIP ====== -->
<div id="tip"></div>

<!-- ====== LOADING SCREEN ====== -->
<div id="loadingScreen">
  <div class="loader-content">
    <div class="loader-rings">
      <div class="ring r-blue"></div>
      <div class="ring r-gold"></div>
      <div class="ring r-black"></div>
      <div class="ring r-green"></div>
      <div class="ring r-red"></div>
    </div>
    <div class="loader-text">Loading 3D Scene...</div>
    <div class="loader-bar"><div class="loader-fill"></div></div>
  </div>
</div>

<script type="module" src="js/main.js"></script>
</body>
</html>
